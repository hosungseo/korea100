name: Check legal source freshness

on:
  schedule:
    # 매주 월요일 03:00 KST (일요일 18:00 UTC) — 일 12시~월 6시 KST 저트래픽 창 안
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    # LAW_OC를 '법령정보' Environment secret으로 관리하므로 이 job이 해당 환경을 사용한다.
    environment: 법령정보
    defaults:
      run:
        working-directory: web
    env:
      # 저장소 시크릿 LAW_OC가 있으면 그것을, 없으면 공용 기본 OC를 사용해 주간 감시가 끊기지 않게 한다.
      LAW_OC: ${{ secrets.LAW_OC || 'wooseongkyun' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm install --global korean-law-mcp@4.7.1
      - name: Report OC source
        env:
          RAW_SECRET: ${{ secrets.LAW_OC }}
          RAW_VAR: ${{ vars.LAW_OC }}
        run: |
          # 값은 출력하지 않고 존재 여부(SET/EMPTY)만 남긴다. 시크릿이 어디에 저장됐는지 진단용.
          if [ -n "$RAW_SECRET" ]; then
            echo "secrets.LAW_OC: SET — repository secret 정상 인식"
          else
            echo "secrets.LAW_OC: EMPTY — repository secret 미인식(공용 기본 OC로 대체됨, 실검증 실패 가능)"
          fi
          if [ -n "$RAW_VAR" ]; then
            echo "::warning::vars.LAW_OC: SET — 값이 'Variables' 탭에 저장돼 있습니다. 워크플로는 Secrets를 읽으므로 'Secrets' 탭으로 옮겨야 동작합니다."
          else
            echo "vars.LAW_OC: EMPTY"
          fi
      - id: freshness
        run: npm run check:freshness
      - name: Create or update freshness issue
        if: steps.freshness.outputs.changed_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create law-freshness --color C78116 --description "Official legal source changed" --force
          issue_number="$(gh issue list --repo "$GITHUB_REPOSITORY" --label law-freshness --state open --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --repo "$GITHUB_REPOSITORY" --body-file freshness-summary.md
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --label law-freshness --title "법령 최신성 점검 필요" --body-file freshness-summary.md
          fi
